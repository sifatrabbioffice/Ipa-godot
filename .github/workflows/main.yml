name: 🧪 Build Advanced Swift-Hybrid Godot 4.7 Native Editor

on:
  workflow_dispatch:

jobs:
  build-hybrid-editor:
    runs-on: macos-15
    steps:
      - name: Checkout Godot Source Code
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: 'master'
          path: godot-source

      - name: Setup Python and SCons
        run: |
          python3 -m pip install scons --break-system-packages

      - name: Compile Godot C++ Core Brain (.a)
        run: |
          cd godot-source
          # iOS এর জন্য পিওর C++ কোর ইঞ্জিন কম্পাইল করা হচ্ছে (No WebKit, Pure Native)
          scons platform=ios target=editor arch=arm64 production=yes lto=auto optimize=speed -j$(sysctl -n hw.ncpu)

      - name: Setup Build Directory Structure
        run: |
          mkdir -p build_stage/GodotEditor.app
          cd godot-source/bin
          LIB_NAME=$(ls libgodot.ios.editor*.a | head -n 1)
          cp $LIB_NAME ../../build_stage/libgodot_core.a

      - name: Generate Objective-C++ Bridging Core
        run: |
          # সুইফটের সাথে C++ ইঞ্জিনের সংযোগ স্থাপন করার জন্য ব্রিজ তৈরি করা হচ্ছে
          cat << 'EOF' > build_stage/GodotBridge.h
          #import <UIKit/UIKit.h>
          @interface GodotBridge : NSObject
          + (void)launchGodotEngine;
          @end
          EOF

          cat << 'EOF' > build_stage/GodotBridge.mm
          #import "GodotBridge.h"
          
          // Godot সোর্সের ভেতরের আসল iOS এন্ট্রি পয়েন্ট
          extern "C" int godot_ios_main(int argc, char *argv[]);

          @implementation GodotBridge
          + (void)launchGodotEngine {
              dispatch_async(dispatch_get_main_loop(), ^{
                  // সরাসরি এডিটর মোড এবং ভিউপোর্ট লঞ্চ করার জন্য ইন্টারনাল ফ্ল্যাগ পুশ করা হলো
                  char *custom_argv[] = { (char *)"godot", (char *)"--editor", NULL };
                  godot_ios_main(2, custom_argv);
              });
          }
          @end
          EOF

      - name: Generate High-End Custom Swift Interface (Loader & Canvas)
        run: |
          cat << 'EOF' > build_stage/App.swift
          import SwiftUI

          @main
          struct GodotApp: App {
              @State private var currentStage: AppStage = .loader
              @State private var engineProgress: CGFloat = 0.0
              
              var body: some Scene {
                  WindowGroup {
                      ZStack {
                          Color.black.ignoresSafeArea()
                          
                          if currentStage == .loader {
                              PremiumLoaderView(progress: $engineProgress, stage: $currentStage)
                          } else {
                              // গডো এডিটর স্ক্রিনটি সুইফটের টপ লেয়ারে পুশ হবে
                              GodotViewportContainer()
                                  .ignoresSafeArea()
                          }
                      }
                  }
              }
          }

          enum AppStage {
              case loader
              case nativeEditor
          }

          // ১. কাস্টম হাই-এন্ড সুইফট লোডার ইন্টারফেস
          struct PremiumLoaderView: View {
              @Binding var progress: CGFloat
              @Binding var stage: AppStage
              @State private var statusText = "Initializing Vulkan Pipelines..."
              
              var body: some View {
                  VStack(spacing: 30) {
                      Spacer()
                      
                      // এডিটর লোগো অ্যানিমেশন (Xcode স্টাইল মিনিমালিজম)
                      ZStack {
                          Circle()
                              .stroke(Color.gray.opacity(0.2), lineWidth: 4)
                              .frame(width: 90, height: 90)
                          
                          Image(systemName: "square.stack.3d.up.fill")
                              .font(.system(size: 35, weight: .semibold))
                              .foregroundColor(.cyan)
                      }
                      
                      VStack(spacing: 10) {
                          Text("GODOT INTERNAL")
                              .font(.system(size: 22, weight: .bold, design: .monospaced))
                              .foregroundColor(.white)
                              .tracking(4)
                          
                          Text("NATIVE IOS ENGINE 4.7")
                              .font(.system(size: 11, weight: .medium))
                              .foregroundColor(.gray)
                              .tracking(2)
                      }
                      
                      Spacer()
                      
                      // প্রিমিয়াম রানিং লোডার বার
                      VStack(alignment: .leading, spacing: 8) {
                          Text(statusText)
                              .font(.system(size: 12, design: .monospaced))
                              .foregroundColor(.cyan.opacity(0.8))
                          
                          GeometryReader { geo in
                              ZStack(alignment: .leading) {
                                  RoundedRectangle(cornerRadius: 3)
                                      .fill(Color.gray.opacity(0.2))
                                  
                                  RoundedRectangle(cornerRadius: 3)
                                      .fill(LinearGradient(colors: [.cyan, .blue], startPoint: .leading, endPoint: .trailing))
                                      .frame(width: geo.size.width * progress)
                              }
                          }
                          .frame(height: 5)
                      }
                      .frame(width: 260)
                      .padding(.bottom, 50)
                  }
                  .onAppear {
                      simulateEngineBoot()
                  }
              }
              
              func simulateEngineBoot() {
                  // প্রথম ধাপ: মেমরি এবং পাইপলাইন চেক করা
                  DispatchQueue.main.asyncAfter(deadline: .now() + 1.0) {
                      withAnimation { self.progress = 0.4 }
                      self.statusText = "Allocating C++ Memory Pools..."
                      
                      // দ্বিতীয় ধাপ: কোর বাইনারি লিঙ্ক ভেরিফিকেশন
                      DispatchQueue.main.asyncAfter(deadline: .now() + 1.2) {
                          withAnimation { self.progress = 0.7 }
                          self.statusText = "Mapping Virtual File System..."
                          
                          // চূড়ান্ত ধাপ: সুইফট থেকে সরাসরি গডো কোরে জাম্প করা
                          DispatchQueue.main.asyncAfter(deadline: .now() + 1.0) {
                              withAnimation { self.progress = 1.0 }
                              self.statusText = "Launching Core Editor Viewport..."
                              
                              DispatchQueue.main.asyncAfter(deadline: .now() + 0.5) {
                                  // ব্রিজ কল করে গডোর আসল এডিটর ভিউপোর্ট চালু করা হচ্ছে
                                  GodotBridge.launchGodotEngine()
                                  self.stage = .nativeEditor
                              }
                          }
                      }
                  }
              }
          }

          // ২. গডো নেটিভ ভিউপোর্ট হোল্ডার
          struct GodotViewportContainer: UIViewControllerRepresentable {
              func makeUIViewController(context: Context) -> UIViewController {
                  let dummyController = UIViewController()
                  dummyController.view.backgroundColor = .black
                  return dummyController
              }
              func updateUIViewController(_ uiViewController: UIViewController, context: Context) {}
          }
          EOF

      - name: Generate System Info.plist
        run: |
          cat << 'EOF' > build_stage/GodotEditor.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GodotEditor</string>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.ios.hybrid</string>
              <key>CFBundleName</key>
              <string>Godot Master</string>
              <key>CFBundleShortVersionString</key>
              <string>4.7</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleSupportedPlatforms</key>
              <array>
                  <string>iPhoneOS</string>
              </array>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIRequiresFullScreen</key>
              <true/>
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Compile and Link Pure Swift and C++ Layers
        run: |
          # ১. ওবজেক্টিভ-সি++ ব্রিজ ফাইলটি কম্পাইল করা হচ্ছে
          xcrun --sdk iphoneos clang++ -target arm64-apple-ios15.0 -c build_stage/GodotBridge.mm -o build_stage/GodotBridge.o -Igodot-source/platform/ios

          # ২. সুইফট ইন্টারফেস কম্পাইল করে এবং সি++ লাইব্রেরির সাথে অবজেক্ট লিঙ্ক করে ফাইনাল বাইনারি তৈরি
          xcrun --sdk iphoneos swiftc -target arm64-apple-ios15.0 -O -parse-as-library \
            build_stage/App.swift build_stage/GodotBridge.o \
            -import-objc-header build_stage/GodotBridge.h \
            -Lbuild_stage -lgodot_core \
            -framework UIKit -framework Foundation -framework AudioToolbox -framework AVFoundation \
            -framework CoreAudio -framework CoreGraphics -framework CoreMedia -framework CoreVideo \
            -framework GameController -framework Metal -framework MetalKit -framework QuartzCore \
            -framework Security -framework OpenGLES -framework CoreMotion -lobjc \
            -o build_stage/GodotEditor.app/GodotEditor

      - name: Package Master Native IPA
        run: |
          chmod +x build_stage/GodotEditor.app/GodotEditor
          mkdir -p Payload
          mv build_stage/GodotEditor.app Payload/
          
          # ট্রলস্টোর/সাইডলোড এনভায়রনমেন্টের জন্য সিগনেচার করা হচ্ছে
          codesign --force --deep --sign - Payload/GodotEditor.app
          zip -r Godot_Swift_Hybrid_Native.ipa Payload/

      - name: Upload Finished Master IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-swift-hybrid-native-ipa
          path: Godot_Swift_Hybrid_Native.ipa
