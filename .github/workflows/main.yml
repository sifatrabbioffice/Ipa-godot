name: 🧪 Build Master iOS Godot Editor (Advanced Wrapper)

on:
  workflow_dispatch:

jobs:
  build-godot-hybrid-editor:
    runs-on: macos-15
    steps:
      - name: Checkout Godot Source Code
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: 'master'
          path: godot-source

      - name: Setup Python and SCons
        run: |
          python3 -m pip install scons --break-system-packages

      - name: Setup Emscripten (emsdk)
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 'latest'
          actions-cache-folder: 'emsdk-cache'

      - name: Verify Emscripten Compiler
        run: |
          emcc -v

      - name: Compile Godot Web Editor from Source (Optimized)
        run: |
          cd godot-source
          # Web-এর জন্য এডিটর কম্পাইল করা হচ্ছে। মেমরি ম্যানেজমেন্টের জন্য optimize=size ব্যবহার করা হলো।
          scons platform=web target=editor threads=yes production=yes lto=auto optimize=size -j$(sysctl -n hw.ncpu)

      - name: Setup Directory Structure for iOS App
        run: |
          mkdir -p build_stage/GodotEditor.app/godot_web

      - name: Process and Move Compiled Assets
        run: |
          cd godot-source/bin
          # কম্পাইল হওয়া HTML ফাইলটিকে index.html হিসেবে রিনেম করা হচ্ছে যাতে র‍্যাপার সহজে চিনতে পারে
          mv *.html ../../build_stage/GodotEditor.app/godot_web/index.html
          mv * ../../build_stage/GodotEditor.app/godot_web/

      - name: Generate Advanced Swift Wrapper (The Engine)
        run: |
          cat << 'EOF' > build_stage/App.swift
          import SwiftUI
          import WebKit

          @main
          struct GodotEditorApp: App {
              var body: some Scene {
                  WindowGroup { 
                      EditorWebView().ignoresSafeArea() 
                  }
              }
          }

          class GodotSchemeHandler: NSObject, WKURLSchemeHandler {
              func webView(_ webView: WKWebView, start urlSchemeTask: WKURLSchemeTask) {
                  guard let url = urlSchemeTask.request.url else { return }
                  var path = url.path
                  if path == "" || path == "/" { path = "/index.html" }
                  
                  let bundlePath = Bundle.main.bundlePath + "/godot_web" + path
                  
                  if FileManager.default.fileExists(atPath: bundlePath) {
                      let ext = (path as NSString).pathExtension.lowercased()
                      var mimeType = "application/octet-stream"
                      
                      switch ext {
                          case "wasm": mimeType = "application/wasm"
                          case "js", "mjs": mimeType = "application/javascript"
                          case "html": mimeType = "text/html"
                          case "css": mimeType = "text/css"
                          case "png": mimeType = "image/png"
                          case "svg": mimeType = "image/svg+xml"
                          case "pck": mimeType = "application/octet-stream"
                          default: break
                      }
                      
                      // Critical Headers for Multi-threading and SharedArrayBuffer in Godot 4
                      let headers = [
                          "Content-Type": mimeType,
                          "Cross-Origin-Opener-Policy": "same-origin",
                          "Cross-Origin-Embedder-Policy": "require-corp",
                          "Access-Control-Allow-Origin": "*",
                          "Cache-Control": "no-store"
                      ]
                      
                      if let response = HTTPURLResponse(url: url, statusCode: 200, httpVersion: "HTTP/1.1", headerFields: headers) {
                          urlSchemeTask.didReceive(response)
                          
                          do {
                              // .alwaysMapped is crucial here to prevent memory exhaustion on iOS
                              let data = try Data(contentsOf: URL(fileURLWithPath: bundlePath), options: .alwaysMapped)
                              urlSchemeTask.didReceive(data)
                              urlSchemeTask.didFinish()
                          } catch {
                              urlSchemeTask.didFailWithError(error)
                          }
                      }
                  } else {
                      let response = HTTPURLResponse(url: url, statusCode: 404, httpVersion: "HTTP/1.1", headerFields: nil)!
                      urlSchemeTask.didReceive(response)
                      urlSchemeTask.didFinish()
                  }
              }
              
              func webView(_ webView: WKWebView, stop urlSchemeTask: WKURLSchemeTask) {}
          }

          struct EditorWebView: UIViewRepresentable {
              func makeUIView(context: Context) -> WKWebView {
                  let config = WKWebViewConfiguration()
                  config.setURLSchemeHandler(GodotSchemeHandler(), forURLScheme: "godot")
                  
                  let prefs = WKWebpagePreferences()
                  prefs.allowsContentJavaScript = true
                  config.defaultWebpagePreferences = prefs
                  
                  config.preferences.javaScriptCanOpenWindowsAutomatically = true
                  config.preferences.setValue(true, forKey: "allowFileAccessFromFileURLs")
                  
                  let webView = WKWebView(frame: .zero, configuration: config)
                  
                  // Disable scrolling and bouncing to simulate native app feel
                  webView.scrollView.isScrollEnabled = false
                  webView.scrollView.bounces = false
                  webView.isOpaque = false
                  webView.backgroundColor = .black
                  
                  if #available(iOS 16.4, *) {
                      webView.isInspectable = true // Allows debugging via Safari on Mac
                  }
                  
                  let request = URLRequest(url: URL(string: "godot://localhost/index.html")!)
                  webView.load(request)
                  
                  return webView
              }
              
              func updateUIView(_ uiView: WKWebView, context: Context) {}
          }
          EOF

      - name: Generate Application Info.plist
        run: |
          cat << 'EOF' > build_stage/GodotEditor.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GodotEditor</string>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.ios.editor</string>
              <key>CFBundleName</key>
              <string>Godot Editor</string>
              <key>CFBundleShortVersionString</key>
              <string>4.7</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>CFBundleSupportedPlatforms</key>
              <array>
                  <string>iPhoneOS</string>
              </array>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIRequiresFullScreen</key>
              <true/>
              <key>UIFileSharingEnabled</key>
              <true/>
              <key>LSSupportsOpeningDocumentsInPlace</key>
              <true/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
          </dict>
          </plist>
          EOF

      - name: Compile Swift Native Wrapper to Binary
        run: |
          xcrun --sdk iphoneos swiftc -target arm64-apple-ios15.0 -O -parse-as-library \
            build_stage/App.swift -o build_stage/GodotEditor.app/GodotEditor
            
          chmod +x build_stage/GodotEditor.app/GodotEditor

      - name: Package Final IPA for Deployment
        run: |
          mkdir -p Payload
          mv build_stage/GodotEditor.app Payload/
          
          # Ad-hoc signing required for IPA structure before sideloading
          codesign --force --deep --sign - Payload/GodotEditor.app
          
          zip -r Godot_Master_Editor_iOS.ipa Payload/

      - name: Upload Finished Editor IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-editor-ios-ipa
          path: Godot_Master_Editor_iOS.ipa
