name: 🧪 Build Xogot-Style Native Godot 4.7 Editor

on:
  workflow_dispatch:

jobs:
  build-xogot-style-editor:
    runs-on: macos-15
    steps:
      - name: Checkout Godot Source Code
        uses: actions/checkout@v4
        with:
          repository: godotengine/godot
          ref: 'master'
          path: godot-source

      - name: Setup Python and SCons
        run: |
          python3 -m pip install scons --break-system-packages

      - name: Compile Godot C++ Core Brain (.a)
        run: |
          cd godot-source
          scons platform=ios target=editor arch=arm64 production=yes lto=auto optimize=speed -j$(sysctl -n hw.ncpu)

      - name: Setup Build Directory Structure
        run: |
          mkdir -p build_stage/GodotEditor.app
          cd godot-source/bin
          LIB_NAME=$(ls libgodot.ios.editor*.a | head -n 1)
          cp $LIB_NAME ../../build_stage/libgodot_core.a

      - name: Generate Objective-C++ Bridging Core (Fixed Threading)
        run: |
          cat << 'EOF' > build_stage/GodotBridge.h
          #import <UIKit/UIKit.h>
          @interface GodotBridge : NSObject
          + (void)launchGodotEngineInView:(UIView *)hostView;
          @end
          EOF

          cat << 'EOF' > build_stage/GodotBridge.mm
          #import "GodotBridge.h"
          #import <dispatch/dispatch.h>

          extern "C" int godot_ios_main(int argc, char *argv[]);

          @implementation GodotBridge
          + (void)launchGodotEngineInView:(UIView *)hostView {
              // Error fixed: dispatch_get_main_queue() correctly used
              dispatch_async(dispatch_get_main_queue(), ^{
                  // In a deeply customized engine, we would pass the hostView pointer to Godot's iOS platform layer here.
                  // For the standard binary, calling main initializes the Metal canvas on the active window.
                  char *custom_argv[] = { (char *)"godot", (char *)"--editor", NULL };
                  godot_ios_main(2, custom_argv);
              });
          }
          @end
          EOF

      - name: Generate Xogot-Style SwiftUI Interface
        run: |
          cat << 'EOF' > build_stage/App.swift
          import SwiftUI

          @main
          struct GodotApp: App {
              @State private var appState: AppState = .projectManager
              
              var body: some Scene {
                  WindowGroup {
                      ZStack {
                          Color(red: 0.1, green: 0.1, blue: 0.12).ignoresSafeArea() // Dark theme background
                          
                          switch appState {
                          case .projectManager:
                              ProjectManagerView(appState: $appState)
                          case .loading:
                              EngineLoaderView(appState: $appState)
                          case .editor:
                              XogotStyleEditorView()
                          }
                      }
                  }
              }
          }

          enum AppState {
              case projectManager, loading, editor
          }

          // ১. Welcome Page / Project Manager (Like image.png)
          struct ProjectManagerView: View {
              @Binding var appState: AppState
              
              var body: some View {
                  VStack(spacing: 30) {
                      Text("Godot Engine")
                          .font(.system(size: 40, weight: .bold))
                          .foregroundColor(.white)
                          .padding(.top, 50)
                      
                      Button(action: {
                          withAnimation { appState = .loading }
                      }) {
                          Text("Create Game")
                              .font(.headline)
                              .foregroundColor(.white)
                              .frame(width: 250, height: 55)
                              .background(Color.blue.opacity(0.8))
                              .cornerRadius(20)
                      }
                      
                      Text("Use Starter Project")
                          .foregroundColor(.blue)
                          .padding(.top, -10)
                      
                      Spacer()
                      
                      // Mock bottom tab bar similar to Xogot
                      HStack {
                          TabBarIcon(icon: "clock", text: "Projects")
                          TabBarIcon(icon: "graduationcap", text: "Learning Center")
                          TabBarIcon(icon: "iphone", text: "On My iPhone", isActive: true)
                      }
                      .padding()
                      .background(Color.black)
                      .cornerRadius(25)
                      .padding(.bottom, 20)
                  }
              }
          }

          struct TabBarIcon: View {
              var icon: String
              var text: String
              var isActive: Bool = false
              
              var body: some View {
                  VStack {
                      Image(systemName: icon)
                          .font(.system(size: 20))
                          .foregroundColor(isActive ? .blue : .gray)
                      Text(text)
                          .font(.system(size: 10))
                          .foregroundColor(isActive ? .blue : .gray)
                  }
                  .frame(maxWidth: .infinity)
              }
          }

          // ২. Loader View
          struct EngineLoaderView: View {
              @Binding var appState: AppState
              
              var body: some View {
                  VStack {
                      ProgressView("Compiling Shaders...")
                          .progressViewStyle(CircularProgressViewStyle(tint: .blue))
                          .foregroundColor(.white)
                  }
                  .onAppear {
                      DispatchQueue.main.asyncAfter(deadline: .now() + 1.5) {
                          withAnimation { appState = .editor }
                      }
                  }
              }
          }

          // ৩. Editor View Page (Like image_2.png) - C++ Engine with Native UI Overlay
          struct XogotStyleEditorView: View {
              var body: some View {
                  ZStack {
                      // The C++ Brain Canvas (Base Layer)
                      GodotNativeCanvas()
                          .ignoresSafeArea()
                      
                      // SwiftUI Overlays (Top UI)
                      VStack {
                          HStack {
                              Image(systemName: "sidebar.left")
                              Spacer()
                              Image(systemName: "play.fill")
                          }
                          .padding()
                          .background(Color.black.opacity(0.8))
                          .foregroundColor(.white)
                          
                          Spacer()
                          
                          // Bottom Tool Bar (Editor, Code, Play)
                          HStack(spacing: 40) {
                              BottomToolIcon(icon: "hammer.fill", title: "Editor", color: .blue)
                              BottomToolIcon(icon: "doc.text.fill", title: "Code", color: .gray)
                              BottomToolIcon(icon: "gamecontroller.fill", title: "Play", color: .gray)
                          }
                          .padding(15)
                          .background(Color(red: 0.15, green: 0.15, blue: 0.15).opacity(0.95))
                          .cornerRadius(30)
                          .padding(.bottom, 10)
                      }
                  }
              }
          }

          struct BottomToolIcon: View {
              var icon: String
              var title: String
              var color: Color
              
              var body: some View {
                  VStack(spacing: 5) {
                      Image(systemName: icon).font(.system(size: 22)).foregroundColor(color)
                      Text(title).font(.system(size: 10, weight: .bold)).foregroundColor(color)
                  }
              }
          }

          // ৪. The Godot Bridge Container
          struct GodotNativeCanvas: UIViewControllerRepresentable {
              func makeUIViewController(context: Context) -> UIViewController {
                  let controller = UIViewController()
                  controller.view.backgroundColor = .black
                  
                  // Trigger the C++ engine to attach to the view hierarchy
                  GodotBridge.launchGodotEngineInView(controller.view)
                  
                  return controller
              }
              
              func updateUIViewController(_ uiViewController: UIViewController, context: Context) {}
          }
          EOF

      - name: Generate System Info.plist
        run: |
          cat << 'EOF' > build_stage/GodotEditor.app/Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>GodotEditor</string>
              <key>CFBundleIdentifier</key>
              <string>org.godotengine.ios.xogotstyle</string>
              <key>CFBundleName</key>
              <string>Godot X</string>
              <key>MinimumOSVersion</key>
              <string>15.0</string>
              <key>UIRequiresFullScreen</key>
              <true/>
          </dict>
          </plist>
          EOF

      - name: Compile and Link Complete Architecture
        run: |
          xcrun --sdk iphoneos clang++ -target arm64-apple-ios15.0 -c build_stage/GodotBridge.mm -o build_stage/GodotBridge.o -Igodot-source/platform/ios

          xcrun --sdk iphoneos swiftc -target arm64-apple-ios15.0 -O -parse-as-library \
            build_stage/App.swift build_stage/GodotBridge.o \
            -import-objc-header build_stage/GodotBridge.h \
            -Lbuild_stage -lgodot_core \
            -framework UIKit -framework Foundation -framework AudioToolbox -framework AVFoundation \
            -framework CoreAudio -framework CoreGraphics -framework CoreMedia -framework CoreVideo \
            -framework GameController -framework Metal -framework MetalKit -framework QuartzCore \
            -framework Security -framework OpenGLES -framework CoreMotion -lobjc \
            -o build_stage/GodotEditor.app/GodotEditor

      - name: Package Final Xogot-Style IPA
        run: |
          chmod +x build_stage/GodotEditor.app/GodotEditor
          mkdir -p Payload
          mv build_stage/GodotEditor.app Payload/
          codesign --force --deep --sign - Payload/GodotEditor.app
          zip -r Godot_Xogot_Style_iOS.ipa Payload/

      - name: Upload Final IPA
        uses: actions/upload-artifact@v4
        with:
          name: godot-xogot-style-ipa
          path: Godot_Xogot_Style_iOS.ipa
